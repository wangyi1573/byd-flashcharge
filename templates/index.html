<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>比亚迪闪充站 · 全国追踪</title>
    <script src="/static/chart.js"></script>
    <script src="/static/echarts.min.js"></script>
    <script src="/static/china.js"></script>
    <style>
        :root{--bg:#0a0e1a;--card:#111827;--card-h:#1a2236;--bdr:rgba(56,189,248,.12);--bdr-h:rgba(56,189,248,.3);--ac:#38bdf8;--grn:#34d399;--amb:#fbbf24;--pur:#a78bfa;--t1:#f1f5f9;--t2:#94a3b8;--t3:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
        .header{position:relative;padding:2.5rem 2rem 2rem;text-align:center;background:linear-gradient(180deg,rgba(56,189,248,.06) 0%,transparent 100%);border-bottom:1px solid var(--bdr)}
        .header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:400px;height:2px;background:linear-gradient(90deg,transparent,var(--ac),transparent)}
        .header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-sub{color:var(--t3);font-size:.85rem;margin-top:.4rem}
        .clock-bar{display:inline-flex;align-items:center;gap:.5rem;margin-top:.8rem;padding:.35rem 1rem;background:rgba(56,189,248,.08);border-radius:20px;border:1px solid var(--bdr);font-size:.8rem;color:var(--t2);font-family:'JetBrains Mono',monospace}
        .clock-bar .dot{width:6px;height:6px;border-radius:50%;background:var(--grn);animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .container{max-width:1440px;margin:0 auto;padding:1.5rem}
        .cards-top{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:.8rem}
        .cards-bottom{display:flex;gap:1rem;margin-bottom:1.5rem}
        .cards-bottom .card{flex:0 0 auto}
        .cards-bottom .card-target{flex:1}
        .card{background:var(--card);border-radius:16px;padding:1.5rem;border:1px solid var(--bdr);transition:border-color .3s,transform .2s;display:flex;flex-direction:column;min-height:170px}
        .card:hover{border-color:var(--bdr-h);transform:translateY(-2px)}
        .card .card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto}
        .card .ci{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
        .card .label-top{font-size:.82rem;color:var(--t2)}
        .card .card-body{margin-top:.8rem}
        .card .value{font-family:'JetBrains Mono',monospace;font-size:2.2rem;font-weight:700;line-height:1}
        .card .label{font-size:.82rem;color:var(--t2);margin-top:.4rem}
        .card .delta{display:inline-flex;align-items:center;gap:.25rem;font-size:.75rem;color:var(--grn);margin-top:.5rem;padding:.15rem .5rem;background:rgba(52,211,153,.1);border-radius:12px}
        .card .mini-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);margin-top:.75rem;overflow:hidden}
        .card .mini-bar-fill{height:100%;border-radius:2px;transition:width 1.2s ease}
        .card .card-footer{margin-top:auto;padding-top:.5rem;font-size:.75rem;color:var(--t3)}
        /* Progress bars for target card */
        .target-row{display:flex;align-items:center;gap:.5rem;margin-top:.55rem;font-size:.78rem}
        .target-row .tr-icon{flex-shrink:0;width:18px;text-align:center}
        .target-row .tr-label{color:var(--t2);white-space:nowrap;min-width:42px}
        .target-row .tr-bar{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.06);overflow:hidden}
        .target-row .tr-bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease}
        .target-row .tr-num{font-family:'JetBrains Mono',monospace;color:var(--t2);font-size:.72rem;white-space:nowrap;min-width:70px;text-align:right}
        .c4 .value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1}
        .c1 .ci{background:rgba(56,189,248,.12)}.c1 .value{color:var(--ac)}
        .c2 .ci{background:rgba(251,191,36,.12)}.c2 .value{color:var(--amb)}
        .c3 .ci{background:rgba(167,139,250,.12)}.c3 .value{color:var(--pur)}
        .c4 .ci{background:rgba(52,211,153,.12)}.c4 .value{color:var(--grn)}
        .stitle{font-size:1rem;font-weight:600;color:var(--t2);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
        .stitle::after{content:'';flex:1;height:1px;background:var(--bdr)}
        .tab-bar{display:flex;gap:.5rem;margin-bottom:1.5rem}
        .tab-btn{padding:.5rem 1.2rem;border-radius:8px;border:1px solid var(--bdr);background:transparent;color:var(--t2);cursor:pointer;font-size:.85rem;font-family:inherit;transition:all .2s}
        .tab-btn:hover{border-color:var(--bdr-h);color:var(--t1)}
        .tab-btn.active{background:rgba(56,189,248,.12);color:var(--ac);border-color:rgba(56,189,248,.4)}
        .tstrip{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
        .tchip{background:var(--card);border-radius:12px;padding:1rem 1.2rem;border:1px solid var(--bdr);display:flex;align-items:center;gap:1rem;transition:border-color .3s}
        .tchip:hover{border-color:var(--bdr-h)}
        .tchip .ti{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
        .tchip .tv{font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:700}
        .tchip .tl{font-size:.8rem;color:var(--t2)}
        .tn .ti{background:rgba(56,189,248,.12)}.tn .tv{color:var(--ac)}
        .th .ti{background:rgba(251,191,36,.12)}.th .tv{color:var(--amb)}
        .ts .ti{background:rgba(167,139,250,.12)}.ts .tv{color:var(--pur)}
        .g2{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
        .gmc{display:grid;grid-template-columns:1.2fr .8fr;gap:1.5rem;margin-bottom:1.5rem}
        .cb{background:var(--card);border-radius:16px;padding:1.5rem;border:1px solid var(--bdr)}
        .cb h3{font-size:.9rem;font-weight:600;color:var(--t2);margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}
        .cb h3 .di{width:8px;height:8px;border-radius:50%;display:inline-block}
        .tb{background:var(--card);border-radius:16px;padding:1.5rem;border:1px solid var(--bdr);margin-bottom:1.5rem}
        .th2{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.8rem}
        .th2 h3{font-size:.95rem;font-weight:600;color:var(--t2)}
        .si{padding:.5rem 1rem;border-radius:8px;border:1px solid var(--bdr);background:var(--bg);color:var(--t1);font-size:.85rem;width:240px;font-family:inherit;transition:border-color .2s}
        .si:focus{outline:none;border-color:var(--ac)}.si::placeholder{color:var(--t3)}
        table{width:100%;border-collapse:collapse}
        th{padding:.6rem .8rem;text-align:left;font-size:.75rem;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--bdr);cursor:pointer;user-select:none;white-space:nowrap;transition:color .2s}
        th:hover{color:var(--ac)}
        th.asc::after{content:' ↑';color:var(--ac)}
        th.desc::after{content:' ↓';color:var(--ac)}
        td{padding:.55rem .8rem;font-size:.88rem;border-bottom:1px solid rgba(51,65,85,.4)}
        tr{transition:background .15s}tr:hover{background:var(--card-h)}
        .rk{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--t3);font-size:.82rem}
        .rk-t{font-family:'JetBrains Mono',monospace;font-weight:700;display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:6px;font-size:.78rem}
        .rk1{background:rgba(251,191,36,.15);color:#fbbf24}
        .rk2{background:rgba(148,163,184,.15);color:#cbd5e1}
        .rk3{background:rgba(217,119,6,.15);color:#f59e0b}
        .nh{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--t1)}
        .footer{text-align:center;padding:2rem;margin-top:1rem;border-top:1px solid var(--bdr);color:var(--t3);font-size:.78rem}
        .footer a{color:var(--ac);text-decoration:none}
        .loading{text-align:center;padding:3rem;color:var(--t3)}

        /* Responsive: Tablet */
        @media(max-width:1024px){
            .cards-top{grid-template-columns:1fr 1fr}
            .cards-bottom{flex-wrap:wrap}
            .cards-bottom .card{flex:1 1 45%}
            .g2,.gmc{grid-template-columns:1fr}
            .tstrip{grid-template-columns:1fr}
            .tab-bar{flex-wrap:wrap}
        }
        /* Responsive: Mobile */
        @media(max-width:640px){
            .cards-top{grid-template-columns:1fr 1fr;gap:.6rem}
            .cards-bottom{gap:.6rem}
            .cards-bottom .card{flex:1 1 100%}
            .card{padding:1rem;border-radius:12px;min-height:140px}
            .card .value{font-size:1.6rem}
            .card .ci{width:28px;height:28px;font-size:.9rem}
            .card .label{font-size:.75rem}
            .card .label-top{font-size:.75rem}
            .card .delta{font-size:.7rem}
            .c4 .value{font-size:1.3rem}
            .target-row{font-size:.7rem;margin-top:.4rem}
            .target-row .tr-num{font-size:.65rem;min-width:55px}
            .header{padding:1.5rem 1rem 1.2rem}
            .header h1{font-size:1.3rem}
            .header-sub{font-size:.75rem}
            .clock-bar{font-size:.7rem;padding:.25rem .8rem}
            .container{padding:.8rem}
            .stitle{font-size:.9rem}
            .tab-bar{gap:.4rem;flex-wrap:wrap}
            .tab-btn{padding:.4rem .8rem;font-size:.78rem}
            .tstrip{grid-template-columns:1fr;gap:.6rem}
            .tchip{padding:.8rem 1rem}
            .tchip .ti{width:36px;height:36px;font-size:1rem}
            .tchip .tv{font-size:1.2rem}
            .g2,.gmc{grid-template-columns:1fr;gap:1rem}
            .cb{padding:1rem;border-radius:12px}
            .cb h3{font-size:.85rem}
            #chinaMap{height:300px!important}
            #donutChart{height:280px!important}
            .tb{padding:1rem;border-radius:12px}
            .th2{flex-direction:column;align-items:stretch;gap:.6rem}
            .th2 h3{font-size:.9rem}
            .si{width:100%;font-size:.85rem}
            th{padding:.4rem .5rem;font-size:.68rem}
            td{padding:.4rem .5rem;font-size:.8rem}
            .footer{padding:1.5rem .8rem}
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ 比亚迪闪充站 · 全国追踪</h1>
        <div class="header-sub">实时监控全国闪充站部署进度</div>
        <div class="clock-bar">
            <div class="dot"></div>
            <span id="liveClock">--</span>
            <span>·</span>
            <span id="updateTime">加载中...</span>
        </div>
    </div>
    <div class="container">
        <div class="cards-top" id="cardsTop">
            <div class="card" style="height:120px;opacity:.3"></div>
            <div class="card" style="height:120px;opacity:.3"></div>
        </div>
        <div class="cards-bottom" id="cardsBottom">
            <div class="card" style="height:120px;opacity:.3"></div>
            <div class="card" style="height:120px;opacity:.3"></div>
        </div>
        <div class="stitle">站点类型分布</div>
        <div class="tstrip" id="typeGrid"></div>
        <div class="tab-bar" id="tabBar">
            <button class="tab-btn active" data-type="all">全部站点</button>
            <button class="tab-btn" data-type="高速站">高速站</button>
            <button class="tab-btn" data-type="站中站">站中站</button>
        </div>
        <div class="cb" style="margin-bottom:1.5rem">
            <h3><span class="di" style="background:var(--ac)"></span> 全国站点分布</h3>
            <div id="chinaMap" style="width:100%;height:460px"></div>
        </div>
        <div class="g2">
            <div class="cb">
                <h3><span class="di" style="background:var(--ac)"></span> 站点增长趋势</h3>
                <canvas id="stationChart"></canvas>
            </div>
            <div class="cb">
                <h3><span class="di" style="background:var(--grn)"></span> 每日新增站点</h3>
                <canvas id="growthChart"></canvas>
            </div>
        </div>
        <div class="tb">
            <div class="th2">
                <h3>🏙️ 各城市闪充站分布</h3>
                <input type="text" class="si" id="citySearch" placeholder="🔍 搜索城市...">
            </div>
            <div style="overflow-x:auto">
            <table>
                <thead><tr>
                    <th data-col="rank">#</th>
                    <th data-col="city">城市</th>
                    <th data-col="station_count">站点数</th>
                    <th data-col="flash_connectors">闪充桩</th>
                </tr></thead>
                <tbody id="cityTable"><tr><td colspan="4" class="loading">加载中...</td></tr></tbody>
            </table>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>比亚迪闪充站全国追踪 · 数据每日自动采集</p>
        <p style="margin-top:.3rem">Powered by Flask + ECharts + Chart.js</p>
    </div>

<script>
let cityData=[], allStations=[], currentType='all', sortCol='station_count', sortDir='desc';

// Clock
function tick(){
    const d=new Date();
    document.getElementById('liveClock').textContent=d.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(tick,1000);tick();

// CountUp
function countUp(el,target,dur){
    dur=dur||1200;const t0=performance.now();
    function step(now){
        const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
        el.textContent=Math.floor(e*target).toLocaleString('zh-CN');
        if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// Load
async function loadData(){
    try{
        const [summary,cities,growth,stations]=await Promise.all([
            fetch('/api/summary').then(r=>r.json()),
            fetch('/api/cities').then(r=>r.json()),
            fetch('/api/growth').then(r=>r.json()),
            fetch('/api/stations').then(r=>r.json()).catch(()=>[]),
        ]);
        cityData=cities; allStations=stations;
        renderSummary(summary);
        renderTypeBreakdown(summary.type_breakdown);
        renderCityTable(cities);
        renderTrend(growth);
        renderMap(cities);
        if(summary.latest) document.getElementById('updateTime').textContent='数据更新于 '+summary.latest.snapshot_date;
    }catch(e){
        console.error(e);
        document.getElementById('summaryCards').innerHTML='<div class="loading" style="grid-column:1/-1">数据加载失败</div>';
    }
}

function renderSummary(data){
    if(!data.latest){document.getElementById('cardsTop').innerHTML='<div class="loading" style="grid-column:1/-1">暂无数据</div>';return;}
    const s=data.latest;
    document.getElementById('cardsTop').innerHTML=`
        <div class="card c1">
            <div class="card-top"><div class="ci">⚡</div><div class="label-top">站点总数</div></div>
            <div class="card-body">
                <div class="value cu" data-t="${s.total_stations}">0</div>
                <div class="delta">▲ ${s.new_stations_today} 今日新增</div>
            </div>
        </div>
        <div class="card c2">
            <div class="card-top"><div class="ci">🔌</div><div class="label-top">闪充桩总数</div></div>
            <div class="card-body">
                <div class="value cu" data-t="${s.total_flash_connectors||0}">0</div>
            </div>
        </div>`;
    document.getElementById('cardsBottom').innerHTML=`
        <div class="card c4">
            <div class="card-top"><div class="ci">🏙️</div><div class="label-top">覆盖城市</div></div>
            <div class="card-body">
                <div class="value cu" data-t="${s.city_count}">0</div>
            </div>
        </div>
        <div class="card c3 card-target">
            <div class="card-top"><div class="ci">🎯</div><div class="label-top">2026 目标</div></div>
            <div class="card-body">
                <div class="value" style="color:var(--pur)"><span class="cu" data-t="${s.total_stations}">0</span> <span style="font-size:1rem;color:var(--t3);font-weight:400">/ 20000</span></div>
            </div>
            <div class="target-row">
                <span class="tr-icon">🏢</span><span class="tr-label">站中站</span>
                <span class="tr-num">${s.total_stations} / 18000</span>
            </div>
            <div class="target-row">
                <span class="tr-icon">🛣️</span><span class="tr-label">高速站</span>
                <span class="tr-num">0 / 2000</span>
            </div>
        </div>`;
    document.querySelectorAll('.cu').forEach(el=>countUp(el,parseInt(el.dataset.t)||0));
}

function renderTypeBreakdown(types){
    if(!types||!types.length)return;
    const ic={'普通站':'🏢','高速站':'🛣️','站中站':'🔄'};
    const cl={'普通站':'tn','高速站':'th','站中站':'ts'};
    document.getElementById('typeGrid').innerHTML=types.map(t=>`
        <div class="tchip ${cl[t.station_type]||'tn'}"><div class="ti">${ic[t.station_type]||'📍'}</div>
        <div><div class="tv cu" data-t="${t.count}">0</div><div class="tl">${t.station_type}</div></div></div>`).join('');
    document.querySelectorAll('#typeGrid .cu').forEach(el=>countUp(el,parseInt(el.dataset.t)||0,800));
}

let mapChart=null, mapStations=[];

function renderMap(cities){
    mapChart=echarts.init(document.getElementById('chinaMap'));
    fetch('/api/stations').then(r=>r.json()).then(stations=>{
        mapStations=stations;
        updateMap();
    }).catch(()=>{
        mapChart.setOption({geo:{map:'china',roam:true,zoom:1.2,
            itemStyle:{areaColor:'#111827',borderColor:'#1e3a5f'},
            emphasis:{itemStyle:{areaColor:'#1a2744'}}}});
    });
    window.addEventListener('resize',()=>mapChart&&mapChart.resize());
}

function updateMap(){
    if(!mapChart)return;
    let filtered=mapStations;
    if(currentType!=='all'){
        filtered=mapStations.filter(s=>(s.attribute_tags||'').includes(currentType)||(s.station_name||'').includes(currentType));
    }
    const points=filtered.map(s=>({name:s.station_name,value:[s.lng,s.lat,1]}));
    mapChart.setOption({
        tooltip:{trigger:'item',formatter:p=>p.name||''},
        geo:{map:'china',roam:true,zoom:1.2,
            scaleLimit:{min:1,max:8},
            itemStyle:{areaColor:'#111827',borderColor:'#1e3a5f',borderWidth:1},
            regions:[],
            emphasis:{itemStyle:{areaColor:'#1a2744'},label:{show:true,color:'#fff',fontSize:10}}},
        series:[{
            type:'scatter',coordinateSystem:'geo',
            data:points,
            symbolSize:6,
            itemStyle:{color:currentType==='高速站'?'#fbbf24':'#38bdf8',opacity:.8},
            emphasis:{itemStyle:{color:'#fbbf24',opacity:1,shadowBlur:10}}
        }]
    },true);
}

function renderDonut(summary){
    const s=summary.latest;if(!s)return;
    const ch=echarts.init(document.getElementById('donutChart'));
    ch.setOption({
        tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},
        legend:{bottom:10,textStyle:{color:'#94a3b8',fontSize:12},icon:'circle',itemGap:16},
        series:[{type:'pie',radius:['45%','72%'],center:['50%','45%'],avoidLabelOverlap:true,
            itemStyle:{borderRadius:6,borderColor:'#111827',borderWidth:3},
            label:{show:true,color:'#94a3b8',fontSize:12,formatter:'{b}\n{d}%'},
            emphasis:{label:{show:true,fontSize:14,fontWeight:'bold'},itemStyle:{shadowBlur:20,shadowColor:'rgba(56,189,248,.3)'}},
            data:[
                {value:s.total_flash_connectors||0,name:'闪充桩',itemStyle:{color:'#a78bfa'}},
                {value:s.total_fast_connectors||0,name:'快充桩',itemStyle:{color:'#38bdf8'}},
                {value:s.total_slow_connectors||0,name:'慢充桩',itemStyle:{color:'#64748b'}},
                {value:s.total_super_connectors||0,name:'超充桩',itemStyle:{color:'#fbbf24'}},
            ].filter(d=>d.value>0)
        }]
    });
    window.addEventListener('resize',()=>ch.resize());
}

function renderTrend(growth){
    if(!growth.length)return;
    const labels=growth.map(g=>g.snapshot_date.slice(5));
    const sc={x:{ticks:{color:'#475569',font:{size:11}},grid:{color:'rgba(51,65,85,.3)'},border:{color:'transparent'}},
              y:{ticks:{color:'#475569',font:{size:11}},grid:{color:'rgba(51,65,85,.3)'},border:{color:'transparent'}}};
    new Chart(document.getElementById('stationChart'),{type:'line',
        data:{labels,datasets:[{label:'站点总数',data:growth.map(g=>g.total_stations),
            borderColor:'#38bdf8',borderWidth:2.5,
            backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,300);g.addColorStop(0,'rgba(56,189,248,.2)');g.addColorStop(1,'rgba(56,189,248,0)');return g;},
            fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#38bdf8'}]},
        options:{responsive:true,interaction:{intersect:false,mode:'index'},
            plugins:{legend:{labels:{color:'#94a3b8',font:{size:12},usePointStyle:true,pointStyle:'circle'}},
                tooltip:{backgroundColor:'#1e293b',borderColor:'rgba(56,189,248,.3)',borderWidth:1,titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:12,cornerRadius:8}},
            scales:sc}});
    new Chart(document.getElementById('growthChart'),{type:'bar',
        data:{labels,datasets:[{label:'新增站点',data:growth.map(g=>g.new_stations_today),
            backgroundColor:'rgba(52,211,153,.7)',hoverBackgroundColor:'#34d399',borderRadius:4,borderSkipped:false}]},
        options:{responsive:true,interaction:{intersect:false,mode:'index'},
            plugins:{legend:{labels:{color:'#94a3b8',font:{size:12},usePointStyle:true,pointStyle:'circle'}},
                tooltip:{backgroundColor:'#1e293b',borderColor:'rgba(52,211,153,.3)',borderWidth:1,titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:12,cornerRadius:8}},
            scales:sc}});
}

// City Table with sort
function renderCityTable(cities){
    const tbody=document.getElementById('cityTable');
    tbody.innerHTML=cities.map((c,i)=>{
        let rk=i<3?`<span class="rk-t rk${i+1}">${i+1}</span>`:`<span class="rk">${i+1}</span>`;
        return `<tr><td>${rk}</td><td style="font-weight:500">${c.city}</td>
        <td class="nh">${c.station_count}</td>
        <td>${c.flash_connectors||0}</td></tr>`;
    }).join('');
}

function sortAndRender(){
    let filtered=currentType==='all'?[...cityData]:cityData.filter(c=>{
        // filter by station type if we have station-level data
        return true; // fallback: show all if no station-level filtering available
    });
    const q=document.getElementById('citySearch').value.toLowerCase();
    if(q)filtered=filtered.filter(c=>c.city.toLowerCase().includes(q));
    if(sortCol==='rank'||sortCol==='city'){
        filtered.sort((a,b)=>sortDir==='asc'?a.city.localeCompare(b.city):b.city.localeCompare(a.city));
    }else{
        filtered.sort((a,b)=>sortDir==='asc'?(a[sortCol]||0)-(b[sortCol]||0):(b[sortCol]||0)-(a[sortCol]||0));
    }
    renderCityTable(filtered);
}

// Table sort
document.querySelectorAll('th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
        const col=th.dataset.col;
        if(sortCol===col)sortDir=sortDir==='desc'?'asc':'desc';
        else{sortCol=col;sortDir='desc';}
        document.querySelectorAll('th[data-col]').forEach(t=>t.classList.remove('asc','desc'));
        th.classList.add(sortDir);
        sortAndRender();
    });
});

// Search
document.getElementById('citySearch').addEventListener('input',()=>sortAndRender());

// Tab filter
document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentType=btn.dataset.type;
        sortAndRender();
        updateMap();
    });
});

loadData();
</script>
</body>
</html>
