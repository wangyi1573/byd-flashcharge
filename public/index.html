// Clock
function tick(){
    const d=new Date();
    document.getElementById('liveClock').textContent=d.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
}
setInterval(tick,1000);tick();

// CountUp
function countUp(el,target,dur){
    dur=dur||1200;const t0=performance.now();
    function step(now){
        const p=Math.min((now-t0)/dur,1),e=1-Math.pow(1-p,3);
        el.textContent=Math.floor(e*target).toLocaleString('zh-CN');
        if(p<1)requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
}

// Load
async function loadData(){
    try{
        const [summary,cities,growth,stations]=await Promise.all([
            fetch('./api/summary.json').then(r=>r.json()),
            fetch('./api/cities.json').then(r=>r.json()),
            fetch('./api/growth.json').then(r=>r.json()),
            fetch('./api/stations.json').then(r=>r.json()).catch(()=>[]),
        ]);
        cityData=cities; allStations=stations;
        renderSummary(summary);
        renderCityTable(cities);
        renderTrend(growth);
        renderMap(cities);
        if(summary.latest) document.getElementById('updateTime').textContent='数据更新于 '+summary.latest.snapshot_date;
    }catch(e){
        console.error(e);
        document.getElementById('summaryCards').innerHTML='<div class="loading" style="grid-column:1/-1">数据加载失败</div>';
    }
}

function renderSummary(data){
    if(!data.latest){document.getElementById('cardsTop').innerHTML='<div class="loading">暂无数据</div>';return;}
    const s=data.latest;
    // Extract type breakdown counts
    const tb=data.type_breakdown||[];
    const zzz=tb.find(t=>t.station_type==='站中站');
    const gss=tb.find(t=>t.station_type==='高速站');
    const zzzCount=zzz?zzz.count:0;
    const gssCount=gss?gss.count:0;
    document.getElementById('cardsTop').innerHTML=`
        <div class="hero">
            <div class="hero-main">
                <div class="hero-main-stat"><div class="value cu" data-t="${s.total_stations}">0</div><div class="hm-label">⚡ 闪充站</div></div>
                <div class="hero-main-stat"><div class="value" style="color:var(--grn)">+${s.new_stations_today}</div><div class="hm-label">📈 今日新增</div></div>
            </div>
            <div class="hero-stats">
                <div class="hero-stat"><div class="hs-val" style="color:var(--amb)"><span class="cu" data-t="${s.total_flash_connectors||0}">0</span></div><div class="hs-label">🔌 闪充桩</div></div>
                <div class="hero-stat"><div class="hs-val" style="color:var(--grn)"><span class="cu" data-t="${s.city_count}">0</span></div><div class="hs-label">🏙️ 覆盖城市</div></div>
                <div class="hero-stat"><div class="hs-val" style="color:var(--pur)"><span class="cu" data-t="${zzzCount}">0</span><span style="color:var(--t3);font-size:.8rem"> / 18000</span></div><div class="hs-label">🏢 站中站</div></div>
                <div class="hero-stat"><div class="hs-val" style="color:var(--pur)"><span class="cu" data-t="${gssCount}">0</span><span style="color:var(--t3);font-size:.8rem"> / 2000</span></div><div class="hs-label">🛣️ 高速站</div></div>
            </div>
        </div>`;
    document.querySelectorAll('.cu').forEach(el=>countUp(el,parseInt(el.dataset.t)||0));
}

function renderTypeBreakdown(types){
    if(!types||!types.length)return;
    const ic={'站中站':'🏢','高速站':'🛣️'};
    const cl={'站中站':'ts','高速站':'th'};
    document.getElementById('typeGrid').innerHTML=types.map(t=>`
        <div class="tchip ${cl[t.station_type]||'tn'}"><div class="ti">${ic[t.station_type]||'📍'}</div>
        <div><div class="tv cu" data-t="${t.count}">0</div><div class="tl">${t.station_type}</div></div></div>`).join('');
    document.querySelectorAll('#typeGrid .cu').forEach(el=>countUp(el,parseInt(el.dataset.t)||0,800));
}

let mapChart=null, mapStations=[];

function renderMap(cities){
    mapChart=echarts.init(document.getElementById('chinaMap'));
    fetch('./api/stations.json').then(r=>r.json()).then(stations=>{
        mapStations=stations;
        updateMap();
    }).catch(()=>{
        mapChart.setOption({geo:{map:'china',roam:true,zoom:1.2,
            itemStyle:{areaColor:'#111827',borderColor:'#1e3a5f'},
            emphasis:{itemStyle:{areaColor:'#1a2744'}}}});
    });
    window.addEventListener('resize',()=>mapChart&&mapChart.resize());
}

function updateMap(){
    if(!mapChart)return;
    let filtered=mapStations;
    if(currentType==='高速站'){
        filtered=mapStations.filter(s=>(s.attribute_tags||'').includes('高速'));
    }else if(currentType==='站中站'){
        filtered=mapStations.filter(s=>!(s.attribute_tags||'').includes('高速'));
    }
    const points=filtered.map(s=>({name:s.station_name,value:[s.lng,s.lat,1]}));
    // Aggregate station counts by province
    const pc={};
    cityData.forEach(c=>{const p=CP[c.city];if(p)pc[p]=(pc[p]||0)+c.station_count});
    const provs=['北京','天津','河北','山西','内蒙古','辽宁','吉林','黑龙江','上海','江苏','浙江','安徽','福建','江西','山东','河南','湖北','湖南','广东','广西','海南','重庆','四川','贵州','云南','西藏','陕西','甘肃','青海','宁夏','新疆','台湾','香港','澳门'];
    const provData=provs.map(name=>({name,value:pc[name]||0}));
    mapChart.setOption({
        tooltip:{trigger:'item',backgroundColor:'#1e293b',borderColor:'rgba(56,189,248,.3)',borderWidth:1,textStyle:{color:'#f1f5f9'},
            formatter:function(p){
                if(p.seriesType==='map')return '<b>'+p.name+'</b><br/>闪充站 '+(p.value||0)+' 座';
                return p.name||'';
            }},
        geo:{map:'china',roam:true,zoom:1.2,
            scaleLimit:{min:1,max:20},
            itemStyle:{areaColor:'#111827',borderColor:'#1e3a5f',borderWidth:1},
            regions:[],
            emphasis:{itemStyle:{areaColor:'#1a2744'},label:{show:true,color:'#fff',fontSize:10}}},
        series:[{
            type:'map',geoIndex:0,data:provData,tooltip:{show:true}
        },{
            type:'scatter',coordinateSystem:'geo',
            data:points,
            symbolSize:2,
            itemStyle:{color:currentType==='高速站'?'#fbbf24':'#38bdf8',opacity:.6},
            emphasis:{itemStyle:{color:'#fbbf24',opacity:1,shadowBlur:10}}
        }]
    },true);
}

function renderDonut(summary){
    const s=summary.latest;if(!s)return;
    const ch=echarts.init(document.getElementById('donutChart'));
    ch.setOption({
        tooltip:{trigger:'item',formatter:'{b}: {c} ({d}%)'},
        legend:{bottom:10,textStyle:{color:'#94a3b8',fontSize:12},icon:'circle',itemGap:16},
        series:[{type:'pie',radius:['45%','72%'],center:['50%','45%'],avoidLabelOverlap:true,
            itemStyle:{borderRadius:6,borderColor:'#111827',borderWidth:3},
            label:{show:true,color:'#94a3b8',fontSize:12,formatter:'{b}\n{d}%'},
            emphasis:{label:{show:true,fontSize:14,fontWeight:'bold'},itemStyle:{shadowBlur:20,shadowColor:'rgba(56,189,248,.3)'}},
            data:[
                {value:s.total_flash_connectors||0,name:'闪充桩',itemStyle:{color:'#a78bfa'}},
                {value:s.total_fast_connectors||0,name:'快充桩',itemStyle:{color:'#38bdf8'}},
                {value:s.total_slow_connectors||0,name:'慢充桩',itemStyle:{color:'#64748b'}},
                {value:s.total_super_connectors||0,name:'超充桩',itemStyle:{color:'#fbbf24'}},
            ].filter(d=>d.value>0)
        }]
    });
    window.addEventListener('resize',()=>ch.resize());
}

function renderTrend(growth){
    if(!growth.length)return;
    const labels=growth.map(g=>g.snapshot_date.slice(5));
    const sc={x:{ticks:{color:'#475569',font:{size:11}},grid:{color:'rgba(51,65,85,.3)'},border:{color:'transparent'}},
              y:{ticks:{color:'#475569',font:{size:11}},grid:{color:'rgba(51,65,85,.3)'},border:{color:'transparent'}}};
    new Chart(document.getElementById('stationChart'),{type:'line',
        data:{labels,datasets:[{label:'站点总数',data:growth.map(g=>g.total_stations),
            borderColor:'#38bdf8',borderWidth:2.5,
            backgroundColor:ctx=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,300);g.addColorStop(0,'rgba(56,189,248,.2)');g.addColorStop(1,'rgba(56,189,248,0)');return g;},
            fill:true,tension:.4,pointRadius:0,pointHoverRadius:5,pointHoverBackgroundColor:'#38bdf8'}]},
        options:{responsive:true,interaction:{intersect:false,mode:'index'},
            plugins:{legend:{labels:{color:'#94a3b8',font:{size:12},usePointStyle:true,pointStyle:'circle'}},
                tooltip:{backgroundColor:'#1e293b',borderColor:'rgba(56,189,248,.3)',borderWidth:1,titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:12,cornerRadius:8}},
            scales:sc}});
    new Chart(document.getElementById('growthChart'),{type:'bar',
        data:{labels,datasets:[{label:'新增站点',data:growth.map(g=>g.new_stations_today),
            backgroundColor:'rgba(52,211,153,.7)',hoverBackgroundColor:'#34d399',borderRadius:4,borderSkipped:false}]},
        options:{responsive:true,interaction:{intersect:false,mode:'index'},
            plugins:{legend:{labels:{color:'#94a3b8',font:{size:12},usePointStyle:true,pointStyle:'circle'}},
                tooltip:{backgroundColor:'#1e293b',borderColor:'rgba(52,211,153,.3)',borderWidth:1,titleColor:'#f1f5f9',bodyColor:'#94a3b8',padding:12,cornerRadius:8}},
            scales:sc}});
}

// City Table with sort
function renderCityTable(cities){
    const tbody=document.getElementById('cityTable');
    tbody.innerHTML=cities.map((c,i)=>{
        let rk=i<3?`<span class="rk-t rk${i+1}">${i+1}</span>`:`<span class="rk">${i+1}</span>`;
        return `<tr><td>${rk}</td><td style="font-weight:500">${c.city}</td>
        <td class="nh">${c.station_count}</td>
        <td>${c.flash_connectors||0}</td></tr>`;
    }).join('');
}

function sortAndRender(){
    let filtered=currentType==='all'?[...cityData]:cityData.filter(c=>{
        // filter by station type if we have station-level data
        return true; // fallback: show all if no station-level filtering available
    });
    const q=document.getElementById('citySearch').value.toLowerCase();
    if(q)filtered=filtered.filter(c=>c.city.toLowerCase().includes(q));
    if(sortCol==='rank'||sortCol==='city'){
        filtered.sort((a,b)=>sortDir==='asc'?a.city.localeCompare(b.city):b.city.localeCompare(a.city));
    }else{
        filtered.sort((a,b)=>sortDir==='asc'?(a[sortCol]||0)-(b[sortCol]||0):(b[sortCol]||0)-(a[sortCol]||0));
    }
    renderCityTable(filtered);
}

// Table sort
document.querySelectorAll('th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
        const col=th.dataset.col;
        if(sortCol===col)sortDir=sortDir==='desc'?'asc':'desc';
        else{sortCol=col;sortDir='desc';}
        document.querySelectorAll('th[data-col]').forEach(t=>t.classList.remove('asc','desc'));
        th.classList.add(sortDir);
        sortAndRender();
    });
});

// Search
document.getElementById('citySearch').addEventListener('input',()=>sortAndRender());

// Tab filter
document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        currentType=btn.dataset.type;
        sortAndRender();
        updateMap();
    });
});

loadData();
</script>
</body>
</html>
